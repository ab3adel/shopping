version: "3.8"

services:
  order-service:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        - APP_NAME=order-service
    command: npm run start:dev -- order-service # This instructs Docker Compose to run the "start:dev" script when starting the container
    environment: # Here we specify the environment variables that will be passed to the container
      - POSTGRES_HOST=order-db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=order-db
      - NATS_URL=nats://nats:4222
    volumes:        
      - ./libs:/usr/src/app/libs
      - ./package.json:/usr/src/app/package.json
      - ./tsconfig.json:/usr/src/app/tsconfig.json
      # Note: This is usually not a good practice to mount the "node_modules" directory on the host to the container       # We are doing this for the sake of simplicity in this example       - ./node_modules:/usr/src/app/node_modules
      # This instructs Docker Compose to mount the "workflows-service" directory on the host to the "/usr/src/app" directory on the container
      # This allows us to make changes to the code on the host and have them reflected in the container without having to rebuild the image
      - ./apps/order-service:/usr/src/app/apps/order-service
    depends_on: # This instructs Docker Compose to start the "workflows-db" container before starting the "workflows-service" container
      - order-db
      - nats
  order-db:
    image: postgres:13.2-alpine
    environment: # We need to make sure these environment variables match the ones we specified in the "workflows-service" service
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=order-db
  gayment-service:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        - APP_NAME=gayment-service
    command: npm run start:dev -- gayment-service
    ports:
      - 3000:3000 # This instructs Docker Compose to map port 3000 on the host to port 3000 on the container
    environment:
      - POSTGRES_HOST=gayment-service-db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=gayment-service
      - NATS_URL=nats://nats:4222
    volumes:        
      - ./libs:/usr/src/app/libs
      - ./package.json:/usr/src/app/package.json    
      - ./tsconfig.json:/usr/src/app/tsconfig.json   
      # Note: This is usually not a good practice to mount the "node_modules" directory on the host to the container       # We are doing this for the sake of simplicity in this example       - ./node_modules:/usr/src/app/node_modules
      - ./apps/gayment-service:/usr/src/app/apps/gayment-service
    depends_on:
      - gayment-service-db
      - order-service
      - nats
  gayment-service-db:
    image: postgres:13.2-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=gayment-service

  inventory-service:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        - APP_NAME=inventory-service
    command: npm run start:dev -- inventory-service # This instructs Docker Compose to run the "start:dev" script when starting the container
    environment: # Here we specify the environment variables that will be passed to the container
      - POSTGRES_HOST=inventory-db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=inventory
      - NATS_URL=nats://nats:4222
    volumes:        
      - ./libs:/usr/src/app/libs
      - ./package.json:/usr/src/app/package.json
      - ./tsconfig.json:/usr/src/app/tsconfig.json
      # Note: This is usually not a good practice to mount the "node_modules" directory on the host to the container       # We are doing this for the sake of simplicity in this example       - ./node_modules:/usr/src/app/node_modules
      # This instructs Docker Compose to mount the "workflows-service" directory on the host to the "/usr/src/app" directory on the container
      # This allows us to make changes to the code on the host and have them reflected in the container without having to rebuild the image
      - ./apps/inventory-service:/usr/src/app/apps/inventory-service
    depends_on: # This instructs Docker Compose to start the "workflows-db" container before starting the "workflows-service" container
      - inventory-db
      - nats
  inventory-db:
    image: postgres:13.2-alpine
    environment: # We need to make sure these environment variables match the ones we specified in the "workflows-service" service
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=inventory-db    
  nats:
    image: nats:2.2.2-alpine    
